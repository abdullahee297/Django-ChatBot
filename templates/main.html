{% extends "base.html" %}

{% block content %}

<div class="container" style="display:flex; height:80vh; gap:20px; padding:20px;">
    {% if messages %}
        {% for message in messages %}
            <div class="notification {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <!-- Sidebar: Chat History -->
    <div class="sidebar" style="width:300px; background:#1e293b; border-radius:10px; padding:15px; overflow-y:auto;">
        <h3 style="color:#f8fafc; font-weight:700; margin-bottom:10px;">Chat History</h3>
        <div class="chat-history">

            <p style="color:#94a3b8; font-style:italic;">No conversations yet</p>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-main" style="flex:1; display:flex; flex-direction:column; background:#0f172a; border-radius:10px; padding:15px;">
        <h2 style="color:#f8fafc; text-green-300 font-weight:700; margin-bottom:15px;">
            Welcome, {{ request.user.username }}!
        </h2>

        <div id="chat-box" style="flex:1; overflow-y:auto; margin-bottom:15px; padding-right:5px;">
            <!-- Chat messages will appear here -->
        </div>

        <form id="chat-form" style="display:flex; gap:10px;">
            <input id="chat-input" type="text" placeholder="Type a message..." style="flex:1; padding:10px; border-radius:5px; border:none; outline:none; background:#1e293b; color:#f8fafc;">
            <button type="submit" class="btn btn-primary" style="padding:10px 20px;">Send</button>
        </form>
    </div>

</div>

<script>
const form = document.getElementById('chat-form');
const input = document.getElementById('chat-input');
const chatBox = document.getElementById('chat-box');

form.addEventListener('submit', async function(e){
    e.preventDefault();

    const msg = input.value.trim();
    if(!msg) return;

    // show user message
    const userMsg = document.createElement('p');
    userMsg.textContent = "You: " + msg;
    userMsg.style.color = "#ffffff";
    chatBox.appendChild(userMsg);

    input.value = "";

    const botMsg = document.createElement('div');
    botMsg.style.background = "#000000";
    botMsg.style.padding = "10px";
    botMsg.style.borderRadius = "8px";
    botMsg.style.marginBottom = "10px";
    botMsg.style.color = "#ffffff";
    botMsg.textContent = "AI: ...";
    botMsg.style.color = "#ffffff";
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;

    const response = await fetch(`/chat/?prompt=${encodeURIComponent(msg)}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let aiText = "";

while(true){
    const {value, done} = await reader.read();
    if(done) break;

    aiText += decoder.decode(value);

    botMsg.innerHTML = formatAIResponse(aiText);

    chatBox.scrollTop = chatBox.scrollHeight;
}
});

function formatAIResponse(text) {

    // Escape HTML first
    text = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

    // Convert code blocks ```language ... ```
    text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
        return `
        <div class="code-container" style="
            position:relative;
            margin:10px 0;
            background:#0d1117;
            border-radius:8px;
            overflow:hidden;
            border:1px solid #30363d;
        ">
            <div style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                background:#161b22;
                padding:8px 12px;
                font-size:14px;
                color:#8b949e;
                border-bottom:1px solid #30363d;
            ">
                <span>${lang || "code"}</span>

                <button onclick="copyCode(this)"
                    style="
                        background:#238636;
                        border:none;
                        color:white;
                        padding:5px 10px;
                        border-radius:5px;
                        cursor:pointer;
                    ">
                    Copy
                </button>
            </div>

            <pre style="
                margin:0;
                padding:15px;
                overflow-x:auto;
                color:#f8f8f2;
                font-size:14px;
            "><code>${code}</code></pre>
        </div>
        `;
    });

    // Markdown formatting
    text = text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/### (.*?)/g, "<h3>$1</h3>")
        .replace(/## (.*?)/g, "<h2>$1</h2>")
        .replace(/# (.*?)/g, "<h1>$1</h1>")
        .replace(/\n/g, "<br>")
        .replace(/- (.*?)/g, "• $1");

    return text;
}

// Copy button function
function copyCode(button) {
    const code = button.parentElement.nextElementSibling.innerText;

    navigator.clipboard.writeText(code);

    button.innerText = "Copied!";

    setTimeout(() => {
        button.innerText = "Copy";
    }, 2000);
}
</script>

{% endblock %}
