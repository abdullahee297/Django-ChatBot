{% extends "base.html" %}

{% block content %}

<style>
body {
    background: #020617;
    font-family: "Courier New", monospace;
}

/* Layout */
.container {
    display: flex;
    height: 90vh;
    padding: 10px;
}

/* Chat box */
.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #020617;
    border: 2px solid #00ff9f;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 0 15px #00ff9f55;
}

/* Header */
.chat-main h2 {
    color: #00ff9f;
    text-shadow: 0 0 5px #00ff9f;
}

/* Chat messages */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding-right: 5px;
}

/* User message */
.user-msg {
    text-align: right;
    margin: 8px 0;
    color: #00e5ff;
}

/* AI message */
.ai-msg {
    text-align: left;
    margin: 8px 0;
    color: #00ff9f;
}

/* Message bubble */
.msg {
    display: inline-block;
    padding: 10px;
    border-radius: 8px;
    max-width: 80%;
    box-shadow: 0 0 8px #00ff9f44;
}

/* Specific styles */
.user-msg .msg {
    background: #001f2f;
    border: 1px solid #00e5ff;
}

.ai-msg .msg {
    background: #021b12;
    border: 1px solid #00ff9f;
}

/* Input area */
#chat-form {
    display: flex;
    margin-top: 10px;
}

#chat-input {
    flex: 1;
    padding: 10px;
    background: #000;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    outline: none;
    border-radius: 5px;
}

/* Button */
button {
    margin-left: 8px;
    padding: 10px 15px;
    background: black;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.2s;
}

button:hover {
    background: #00ff9f;
    color: black;
}

/* Scrollbar */
#chat-box::-webkit-scrollbar {
    width: 5px;
}
#chat-box::-webkit-scrollbar-thumb {
    background: #00ff9f;
}

/* Mobile */
@media (max-width: 768px) {
    .container {
        height: auto;
    }
    .chat-main {
        height: 85vh;
    }
}
</style>

<div class="container">
    <div class="chat-main">
        <h2>⚡ AI TERMINAL — {{ request.user.username }}</h2>

        <div id="chat-box"></div>

        <form id="chat-form">
            <input id="chat-input" type="text" placeholder="> enter command...">
            <button type="submit">SEND</button>
        </form>
    </div>
</div>

<script>
const form = document.getElementById('chat-form');
const input = document.getElementById('chat-input');
const chatBox = document.getElementById('chat-box');

form.addEventListener('submit', async function(e){
    e.preventDefault();

    const msg = input.value.trim();
    if(!msg) return;

    // USER MESSAGE
    const userDiv = document.createElement('div');
    userDiv.className = "user-msg";
    userDiv.innerHTML = `<div class="msg">> ${msg}</div>`;
    chatBox.appendChild(userDiv);

    input.value = "";

    // AI MESSAGE
    const aiDiv = document.createElement('div');
    aiDiv.className = "ai-msg";
    const aiBubble = document.createElement('div');
    aiBubble.className = "msg";
    aiBubble.innerHTML = "AI: initializing...";
    aiDiv.appendChild(aiBubble);
    chatBox.appendChild(aiDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

    const response = await fetch(`/chat/?prompt=${encodeURIComponent(msg)}`);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let aiText = "";

    while(true){
        const {value, done} = await reader.read();
        if(done) break;

        aiText += decoder.decode(value);
        aiBubble.innerHTML = formatAIResponse(aiText);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
});

function formatAIResponse(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\n/g, "<br>");
}
</script>
