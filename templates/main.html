{% extends "base.html" %}

{% block content %}

<style>
* {
    box-sizing: border-box;
}

/* Prevent horizontal scroll */
body {
    overflow-x: hidden;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
    padding: 10px;
    gap: 10px;
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: #1e293b;
    border-radius: 10px;
    padding: 15px;
    overflow-y: auto;
    transition: 0.3s;
}

/* Chat */
.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0f172a;
    border-radius: 10px;
    padding: 10px;
}

/* Header */
.chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Chat messages */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 5px;
}

/* Message bubbles */
.msg {
    max-width: 80%;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    word-wrap: break-word;
}

.user-msg {
    background: #2563eb;
    color: white;
    margin-left: auto;
}

.ai-msg {
    background: #1e293b;
    color: #2bff00;
}

/* Input */
#chat-form {
    display: flex;
    gap: 8px;
    margin-top: 5px;
}

#chat-input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
}

/* Button */
button {
    padding: 10px 15px;
}

/* Mobile Fix */
@media (max-width: 768px) {

    .container {
        flex-direction: column;
        padding: 5px;
        gap: 5px;
    }

    /* Sidebar hidden by default */
    .sidebar {
        position: absolute;
        left: -100%;
        top: 0;
        height: 100%;
        z-index: 10;
        width: 75%;
    }

    .sidebar.active {
        left: 0;
    }

    /* Chat takes full width */
    .chat-main {
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }

    /* Input stays visible */
    #chat-form {
        position: sticky;
        bottom: 0;
        background: #0f172a;
        padding-bottom: env(safe-area-inset-bottom);
    }
}
</style>

<div class="container">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <h3 style="color:#f8fafc;">Chat History</h3>
        <p style="color:#94a3b8;">No conversations yet</p>
    </div>

    <!-- Chat -->
    <div class="chat-main">

        <div class="chat-header">
            <h3 style="color:#f8fafc;">
                {{ request.user.username }}
            </h3>

            <!-- Mobile Menu Button -->
            <button onclick="toggleSidebar()">☰</button>
        </div>

        <div id="chat-box"></div>

        <form id="chat-form">
            <input id="chat-input" type="text" placeholder="Type a message...">
            <button type="submit">Send</button>
        </form>

    </div>
</div>

<script>
const form = document.getElementById('chat-form');
const input = document.getElementById('chat-input');
const chatBox = document.getElementById('chat-box');

function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('active');
}

form.addEventListener('submit', async function(e){
    e.preventDefault();

    const msg = input.value.trim();
    if(!msg) return;

    // USER MESSAGE
    const userDiv = document.createElement('div');
    userDiv.className = "msg user-msg";
    userDiv.innerText = msg;
    chatBox.appendChild(userDiv);

    input.value = "";

    // AI MESSAGE
    const aiDiv = document.createElement('div');
    aiDiv.className = "msg ai-msg";
    aiDiv.innerText = "Typing...";
    chatBox.appendChild(aiDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

    const response = await fetch(`/chat/?prompt=${encodeURIComponent(msg)}`);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let aiText = "";

    while(true){
        const {value, done} = await reader.read();
        if(done) break;

        aiText += decoder.decode(value);
        aiDiv.innerHTML = formatAIResponse(aiText);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
});

function formatAIResponse(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\n/g, "<br>");
}
</script>

{% endblock %}
