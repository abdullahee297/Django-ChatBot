<style>
/* Layout */
.container {
    display: flex;
    height: 90vh;
    gap: 15px;
    padding: 15px;
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: #1e293b;
    border-radius: 10px;
    padding: 15px;
    overflow-y: auto;
}

/* Chat area */
.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0f172a;
    border-radius: 10px;
    padding: 15px;
}

/* Chat box */
#chat-box {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 10px;
}

/* Input area */
#chat-form {
    display: flex;
    gap: 8px;
}

#chat-input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1e293b;
    color: #fff;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        height: auto;
    }

    .sidebar {
        width: 100%;
        max-height: 150px;
    }

    .chat-main {
        height: 75vh;
    }

    #chat-form {
        flex-direction: row;
    }

    #chat-input {
        font-size: 14px;
    }

    button {
        padding: 10px;
        font-size: 14px;
    }
}
</style>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3 style="color:#f8fafc;">Chat History</h3>
        <p style="color:#94a3b8;">No conversations yet</p>
    </div>

    <!-- Chat -->
    <div class="chat-main">
        <h2 style="color:#f8fafc;">
            Welcome, {{ request.user.username }}!
        </h2>

        <div id="chat-box"></div>

        <form id="chat-form">
            <input id="chat-input" type="text" placeholder="Type a message...">
            <button type="submit" class="btn btn-primary">Send</button>
        </form>
    </div>

</div>

<script>
const form = document.getElementById('chat-form');
const input = document.getElementById('chat-input');
const chatBox = document.getElementById('chat-box');

form.addEventListener('submit', async function(e){
    e.preventDefault();

    const msg = input.value.trim();
    if(!msg) return;

    const userMsg = document.createElement('p');
    userMsg.textContent = "You: " + msg;
    userMsg.style.color = "#fff";
    chatBox.appendChild(userMsg);

    input.value = "";

    const botMsg = document.createElement('div');
    botMsg.style.background = "#1e293b";
    botMsg.style.padding = "10px";
    botMsg.style.borderRadius = "8px";
    botMsg.style.marginBottom = "10px";
    botMsg.style.color = "#2bff00";
    botMsg.textContent = "AI: ...";
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;

    const response = await fetch(`/chat/?prompt=${encodeURIComponent(msg)}`);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let aiText = "";

    while(true){
        const {value, done} = await reader.read();
        if(done) break;

        aiText += decoder.decode(value);
        botMsg.innerHTML = formatAIResponse(aiText);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
});

function formatAIResponse(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/### (.*?)/g, "<h3>$1</h3>")
        .replace(/## (.*?)/g, "<h2>$1</h2>")
        .replace(/# (.*?)/g, "<h1>$1</h1>")
        .replace(/\n/g, "<br>")
        .replace(/- (.*?)/g, "• $1");
}
</script>

{% endblock %}
